<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election 2082 Results Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-header { background-color: #003893; color: white; }
        .win-badge { background-color: #28a745; color: white; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Election 2082 FPTP Results</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5 class="text-muted">Total Constituencies</h5>
                    <h2 id="total-seats">165</h2>
                </div>
            </div>
        </div>
        
        <div class="col-12">
            <div class="card shadow">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Candidate Wise Results</h5>
                    <input type="text" id="search" class="form-control w-25" placeholder="Search Candidate/Party...">
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Candidate Name</th>
                                    <th>Political Party</th>
                                    <th>Votes Received</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="result-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Sample Data (In a real app, use fetch('election_data.json'))
    const data = [
        {candidate: "Gagan Thapa", party: "Nepali Congress", votes: "25430", status: "Leading"},
        {candidate: "KP Sharma Oli", party: "CPN-UML", votes: "28910", status: "Elected"},
        {candidate: "Rabi Lamichhane", party: "RSP", votes: "12400", status: "Counting"}
    ];

    const tbody = document.getElementById('result-body');
    
    function renderTable(filter = "") {
        tbody.innerHTML = "";
        data.filter(item => item.candidate.toLowerCase().includes(filter.toLowerCase()))
            .forEach(item => {
            const row = `<tr>
                <td><strong>${item.candidate}</strong></td>
                <td>${item.party}</td>
                <td>${item.votes}</td>
                <td><span class="badge ${item.status === 'Elected' ? 'win-badge' : 'bg-info'}">${item.status}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    document.getElementById('search').addEventListener('input', (e) => renderTable(e.target.value));
    renderTable();
</script>
</body>
</html>
