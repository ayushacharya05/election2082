<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Election 2082 Interactive Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #map-container { height: 500px; background: #f8f9fa; border-radius: 8px; }
        .party-legend { font-size: 0.9rem; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-danger shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Election 2082 Result Map</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-lg-4 col-md-12">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white"><strong>Party-wise Lead</strong></div>
                <div class="card-body">
                    <div class="mb-2"><span class="dot bg-primary"></span> Nepali Congress: <span class="fw-bold">45</span></div>
                    <div class="mb-2"><span class="dot bg-danger"></span> CPN-UML: <span class="fw-bold">42</span></div>
                    <div class="mb-2"><span class="dot bg-warning"></span> RSP: <span class="fw-bold">12</span></div>
                    <hr>
                    <p class="text-muted small">Click on a district on the map to see detailed candidate results.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-8 col-md-12">
            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div id="map-container" class="d-flex align-items-center justify-content-center">
                        <div class="text-center">
                            <h4 class="text-muted">Interactive Map Loading...</h4>
                            <p>Integrating your <code>map_results.json</code> here.</p>
                        </div>
                    </div>
                </div>
                <div class="card-footer text-end">
                    <button class="btn btn-sm btn-outline-secondary" onclick="location.reload()">Refresh Live Data</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
